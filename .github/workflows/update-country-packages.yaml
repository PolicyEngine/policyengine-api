name: Update country packages

on:
  schedule:
    - cron: "*/30 * * * *" # Every 30 minutes
  workflow_dispatch:

jobs:
  update:
    name: Update ${{ matrix.package }}
    runs-on: ubuntu-latest
    if: github.repository == 'PolicyEngine/policyengine-api'
    strategy:
      matrix:
        package: [policyengine-us, policyengine-uk]
      fail-fast: false
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check for update and open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          chmod +x .github/scripts/update-package.sh
          .github/scripts/update-package.sh ${{ matrix.package }}
